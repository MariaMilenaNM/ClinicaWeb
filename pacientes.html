<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Pacientes</title>

  <link href="pacientes.css" rel="stylesheet" >

</head>
<body>

<a href="index.html" class="btn-sair">Sair</a>

<div class="cartao">

  <h2>Faça sua conta</h2>

  <div class="campo">
    <label>Nome completo</label>
    <input type="text" id="nome">
  </div>

  <div class="campo">
    <label>Data de nascimento</label>
    <input type="date" id="data">
  </div>

  <div class="campo">
    <label>Email</label>
    <input type="text" id="email">
  </div>

  <div class="campo">
    <label>Telefone</label>
    <input type="tel" id="contato">
  </div>

  <div class="campo">
    <label>Modalidade</label><br>
    <input type="checkbox" id="mod"> Remota
    <input type="checkbox" id="mod2"> Presencial
  </div>

  <button id="btnSalvar" onclick="cadastrarDados()">Cadastrar</button>
</div>

<details style="margin-top: 20px; width: 100%; max-width: 800px;">
  <summary style="cursor: pointer; font-weight: bold; text-align: center;">Clique para ver a lista de pacientes</summary>
  <table border="1">
    <thead>
    <tr>
      <th>Nome</th>
      <th>Data</th>
      <th>Email</th>
      <th>Contato</th>
      <th>Modalidade</th>
      <th>Ações</th>
    </tr>
    </thead>
    <tbody id="tabelaPacientes"></tbody>
  </table>
</details>

<script>
  let listaPacientes = [];
  let indexEdicao = null;

  function cadastrarDados() {
    let nome = document.getElementById('nome').value;
    if (nome === "") {
      alert("Por favor, preencha o nome.");
      return;
    }

    let paciente = {
      nome: nome,
      data: document.getElementById('data').value,
      email: document.getElementById('email').value,
      contato: document.getElementById('contato').value,
      mod: document.getElementById('mod').checked ? "Remota" :
        document.getElementById('mod2').checked ? "Presencial" : "Não definida"
    };

    if (indexEdicao !== null) {
      listaPacientes[indexEdicao] = paciente;
      indexEdicao = null;
      document.getElementById('btnSalvar').innerText = "Cadastrar";
    } else {
      listaPacientes.push(paciente);
    }

    exibirDados();
    limparCadastro();
  }

  function exibirDados() {
    let tbody = document.getElementById('tabelaPacientes');
    let html = "";

    listaPacientes.forEach((p, index) => {
      html += `
        <tr>
          <td>${p.nome}</td>
          <td>${p.data}</td>
          <td>${p.email}</td>
          <td>${p.contato}</td>
          <td>${p.mod}</td>
          <td>
            <button onclick="editarDados(${index})" style="width: auto; padding: 5px 10px;">Editar</button>
            <button onclick="deletarDados(${index})" class="btn-excluir">Excluir</button>
          </td>
        </tr>`;
    });

    tbody.innerHTML = html;
  }

  function editarDados(index) {
    let p = listaPacientes[index];

    document.getElementById('nome').value = p.nome;
    document.getElementById('data').value = p.data;
    document.getElementById('email').value = p.email;
    document.getElementById('contato').value = p.contato;
    document.getElementById('mod').checked = (p.mod === "Remota");
    document.getElementById('mod2').checked = (p.mod === "Presencial");

    indexEdicao = index;
    document.getElementById('btnSalvar').innerText = "Salvar Alteração";
  }

  function deletarDados(index) {
    if (confirm("Tem certeza que deseja excluir este paciente?")) {
      listaPacientes.splice(index, 1);
      if (indexEdicao === index) {
        indexEdicao = null;
        document.getElementById('btnSalvar').innerText = "Cadastrar";
      }

      exibirDados();
    }
  }

  function limparCadastro() {
    document.getElementById('nome').value = "";
    document.getElementById('data').value = "";
    document.getElementById('email').value = "";
    document.getElementById('contato').value = "";
    document.getElementById('mod').checked = false;
    document.getElementById('mod2').checked = false;
  }
</script>

</body>
</html>
