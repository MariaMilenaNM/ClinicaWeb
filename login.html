<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Mentis</title>
    <link href="login.css" rel="stylesheet">
</head>
<body>

<a href="index.html" class="btn-sair">Sair</a>

<div id="telaAuth">

    <div class="auth-card">
        <div class="auth-logo">MS</div>
        <h1 id="authTitulo">Área do Paciente</h1>
        <p id="authSubtitulo">Acesse sua conta Mentis</p>

        <div id="formLogin">
            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••">
            </div>
            <button onclick="fazerLogin()">Entrar</button>
            <p class="auth-link">Primeira vez aqui? <span onclick="mostrarCadastro()">Criar conta</span></p>
        </div>

        <div id="formCadastro" style="display:none;">
            <div class="campo">
                <label>Nome completo</label>
                <input type="text" id="cadNome" placeholder="Seu nome">
            </div>
            <div class="campo">
                <label>Data de nascimento</label>
                <input type="date" id="cadData">
            </div>
            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="cadEmail" placeholder="seu@email.com">
            </div>
            <div class="campo">
                <label>Telefone</label>
                <input type="tel" id="cadTelefone" placeholder="(81) 99999-9999">
            </div>
            <div class="campo">
                <label>Cidade</label>
                <input type="text" id="cadCidade" placeholder="Ex: Caruaru">
            </div>
            <div class="campo">
                <label>Estado</label>
                <select id="cadEstado">
                    <option value="">Selecione...</option>
                    <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                    <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                    <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                    <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                    <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                    <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                    <option>SP</option><option>SE</option><option>TO</option>
                </select>
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" id="cadSenha" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="campo">
                <label>Confirmar senha</label>
                <input type="password" id="cadSenhaConf" placeholder="Repita a senha">
            </div>
            <button onclick="cadastrar()">Criar conta</button>
            <p class="auth-link">Já tem conta? <span onclick="mostrarLogin()">Entrar</span></p>
        </div>
    </div>

</div>

<script>

    function mostrarCadastro() {
        document.getElementById('formLogin').style.display = 'none';
        document.getElementById('formCadastro').style.display = 'block';
        document.getElementById('authTitulo').innerText = 'Criar conta';
        document.getElementById('authSubtitulo').innerText = 'Preencha seus dados para se cadastrar';
    }

    function mostrarLogin() {
        document.getElementById('formCadastro').style.display = 'none';
        document.getElementById('formLogin').style.display = 'block';
        document.getElementById('authTitulo').innerText = 'Área do Paciente';
        document.getElementById('authSubtitulo').innerText = 'Acesse sua conta Mentis';
    }

    function cadastrar() {
        let nome      = document.getElementById('cadNome').value.trim();
        let data      = document.getElementById('cadData').value;
        let email     = document.getElementById('cadEmail').value.trim();
        let telefone  = document.getElementById('cadTelefone').value.trim();
        let cidade    = document.getElementById('cadCidade').value.trim();
        let estado    = document.getElementById('cadEstado').value;
        let senha     = document.getElementById('cadSenha').value;
        let senhaConf = document.getElementById('cadSenhaConf').value;

        if (!nome || !data || !email || !telefone || !cidade || !estado || !senha) {
            alert('Preencha todos os campos!');
            return;
        }
        if (senha.length < 6) {
            alert('A senha precisa ter pelo menos 6 caracteres.');
            return;
        }
        if (senha !== senhaConf) {
            alert('As senhas não coincidem!');
            return;
        }

        let pacientes = JSON.parse(localStorage.getItem('pacientes') || '[]');

        let jaExiste = pacientes.find(p => p.email === email);
        if (jaExiste) {
            alert('Já existe uma conta com este e-mail. Faça login.');
            mostrarLogin();
            return;
        }

        let novoPaciente = { nome, data, email, telefone, cidade, estado, senha };
        pacientes.push(novoPaciente);
        localStorage.setItem('pacientes', JSON.stringify(pacientes));

        alert('Conta criada com sucesso! Faça login.');
        mostrarLogin();
    }

    function fazerLogin() {
        let email = document.getElementById('loginEmail').value.trim();
        let senha = document.getElementById('loginSenha').value;

        if (!email || !senha) {
            alert('Preencha e-mail e senha.');
            return;
        }

        let pacientes = JSON.parse(localStorage.getItem('pacientes') || '[]');
        let encontrado = pacientes.find(p => p.email === email && p.senha === senha);

        if (!encontrado) {
            alert('E-mail ou senha incorretos.');
            return;
        }

        localStorage.setItem('pacienteLogado', JSON.stringify(encontrado));
        window.location.href = 'painel.html';
    }

</script>
</body>
</html>
