<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel – Mentis</title>
    <link href="../style/painel.css" rel="stylesheet">
</head>
<body>

<div class="painel-wrapper">

    <aside class="sidebar" id="sidebar">

        <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Recolher painel">&#9776;</button>

        <div class="sidebar-conteudo" id="sidebarConteudo">
            <div class="avatar" id="avatarLetra">?</div>
            <h2 class="sidebar-nome" id="sidebarNome">–</h2>
            <span class="sidebar-tag">Paciente Mentis</span>

            <hr class="sidebar-divider">

            <div class="info-item">
                <span class="info-label">E-MAIL</span>
                <span class="info-valor" id="sidebarEmail">–</span>
            </div>

            <div class="info-item">
                <span class="info-label">TELEFONE</span>
                <span class="info-valor" id="sidebarTelefone">–</span>
            </div>

            <div class="info-item">
                <span class="info-label">NASCIMENTO</span>
                <span class="info-valor" id="sidebarData">–</span>
            </div>

            <div class="info-item">
                <span class="info-label">CIDADE / ESTADO</span>
                <span class="info-valor" id="sidebarLocal">–</span>
            </div>

            <hr class="sidebar-divider">

            <button class="btn-editar" onclick="toggleEdicao()">Editar Perfil</button>

            <div id="formEditar" style="display:none; margin-top:14px;">
                <div class="campo-edit">
                    <label>Nome</label>
                    <input type="text" id="editNome">
                </div>
                <div class="campo-edit">
                    <label>Telefone</label>
                    <input type="tel" id="editTelefone">
                </div>
                <div class="campo-edit">
                    <label>Cidade</label>
                    <input type="text" id="editCidade">
                </div>
                <div class="campo-edit">
                    <label>Estado</label>
                    <select id="editEstado">
                        <option value="">Selecione...</option>
                        <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                        <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                        <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                        <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                        <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                        <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                        <option>SP</option><option>SE</option><option>TO</option>
                    </select>
                </div>
                <button class="btn-salvar-edit" onclick="salvarEdicao()">Salvar</button>
                <button class="btn-cancelar-edit" onclick="toggleEdicao()">Cancelar</button>
            </div>

            <button class="btn-sair" onclick="sair()">Sair da Conta</button>
        </div>

    </aside>

    <main class="painel-main">
        <div class="painel-header">
            <h1>Profissionais Disponíveis</h1>
            <p>Encontre o psicólogo ideal para o seu atendimento em nossa rede de parceiros.</p>

            <!--  MILENA NAO APAGA ISSO PRA EU NAO ESQUECER QUE VOU MEXER AQUI -->
        </div>

        <div class="cards-grid" id="cardsGrid">
            <p class="sem-dados">Nenhum profissional cadastrado ainda.</p>
        </div>

        <div class="paginacao" id="paginacao"></div>
    </main>

</div>

<script src="../crudjs/crudPaciente.js"></script>
<script src="../crudjs/crudProfissional.js"></script>
<script src="../js/painel.js"></script>

</body>
</html>
